- question: What is the total revenue generated from each product category in the year 2016?
  query: |
    SELECT
        c.CategoryName as "Categories.CategoryName",
        SUM(od.Quantity * od.UnitPrice * (1 - od.Discount)) AS "Categories.TotalRevenue"
    FROM Categories c
    JOIN Products p ON c.CategoryID = p.CategoryID
    JOIN OrderDetails od ON p.ProductID = od.ProductID
    JOIN Orders o ON od.OrderID = o.OrderID
    WHERE strftime('%Y', o.OrderDate) = '2016'
    GROUP BY c.CategoryName
    ORDER BY "Categories.TotalRevenue" DESC
  expected: |
    [{"Categories.CategoryName": "Beverages", "Categories.TotalRevenue": 47919.0},
    {"Categories.CategoryName": "Dairy Products", "Categories.TotalRevenue": 40980.45},
    {"Categories.CategoryName": "Confections", "Categories.TotalRevenue": 29685.55},
    {"Categories.CategoryName": "Meat/Poultry", "Categories.TotalRevenue": 28813.66},
    {"Categories.CategoryName": "Seafood", "Categories.TotalRevenue": 19391.22},
    {"Categories.CategoryName": "Condiments", "Categories.TotalRevenue": 17900.38},
    {"Categories.CategoryName": "Produce", "Categories.TotalRevenue": 13885.78},
    {"Categories.CategoryName": "Grains/Cereals", "Categories.TotalRevenue": 9507.92}]
  aliases:
    Categories.CategoryName:
      - Category
      - CategoryName
    Categories.TotalRevenue:
      - Revenue
      - TotalRevenue
      - Categories.Revenue
      - Categories.TotalRevenue
      - Orders.Revenue
      - Orders.TotalRevenue
      - OrderDetails.Revenue
      - OrderDetails.TotalRevenue

- question: Who are the top 5 customers by total revenue in 2016?
  query: |
    SELECT 
        c.CompanyName as "Customers.CompanyName",
        SUM(od.Quantity * od.UnitPrice * (1 - od.Discount)) AS "Customers.TotalRevenue"
    FROM Customers c
    JOIN Orders o ON c.CustomerID = o.CustomerID
    JOIN OrderDetails od ON o.OrderID = od.OrderID
    WHERE strftime('%Y', o.OrderDate) = '2016'
    GROUP BY c.CustomerID, c.CompanyName
    ORDER BY "Customers.TotalRevenue" DESC
    LIMIT 5
  expected: |-
    [{"Customers.CompanyName": "Ernst Handel", "Customers.TotalRevenue": 15568.065},
     {"Customers.CompanyName": "QUICK-Stop", "Customers.TotalRevenue": 11950.08},
     {"Customers.CompanyName": "Rattlesnake Canyon Grocery", "Customers.TotalRevenue": 10475.78},
     {"Customers.CompanyName": "Save-a-lot Markets", "Customers.TotalRevenue": 10338.265},
     {"Customers.CompanyName": "Piccolo und mehr", "Customers.TotalRevenue": 10033.28}]
  aliases:
    Customers.CompanyName:
      - Customer
      - CompanyName
    Customers.TotalRevenue:
      - TotalRevenue
      - Customers.TotalRevenue
      - OrderDetails.TotalRevenue

