# northwind_semantic.yml
# Semantic Layer Definition for the Northwind Database using BSL
# Generated by DeepSeek

profile: northwind

Customers:
  table: Customers
  dimensions:
    CustomerID: _.CustomerID
    CompanyName: _.CompanyName
    ContactName: _.ContactName
    ContactTitle: _.ContactTitle
    Address: _.Address
    City: _.City
    Region: _.Region
    PostalCode: _.PostalCode
    Country: _.Country
  measures:
    CustomerCount: _.count()

Suppliers:
  table: Suppliers
  dimensions:
    SupplierID: _.SupplierID
    CompanyName: _.CompanyName
    ContactName: _.ContactName
    Phone: _.Phone
    HomePage: _.HomePage
  measures:
    SupplierCount: _.count()

Categories:
  table: Categories
  dimensions:
    CategoryID: _.CategoryID
    CategoryName: _.CategoryName
    Description: _.Description
  measures:
    CategoryCount: _.count()

Employees:
  table: Employees
  dimensions:
    EmployeeID: _.EmployeeID
    LastName: _.LastName
    FirstName: _.FirstName
    Title: _.Title
    ReportsTo: _.ReportsTo
    BirthDate: _.BirthDate
    HireDate: _.HireDate
    Address: _.Address
    City: _.City
    Region: _.Region
    PostalCode: _.PostalCode
    Country: _.Country
  measures:
    EmployeeCount: _.count()

Products:
  table: Products
  dimensions:
    ProductID: _.ProductID
    ProductName: _.ProductName
    SupplierID: _.SupplierID
    CategoryID: _.CategoryID
    QuantityPerUnit: _.QuantityPerUnit
    UnitPrice: _.UnitPrice
    UnitsInStock: _.UnitsInStock
    UnitsOnOrder: _.UnitsOnOrder
    ReorderLevel: _.ReorderLevel
    Discontinued: _.Discontinued
  measures:
    TotalUnitsInStock: _.UnitsInStock.sum()
    AvgUnitPrice: _.UnitPrice.mean()
    ProductCount: _.count()
  joins:
    Suppliers:
      model: Suppliers
      type: one
      left_on: SupplierID
      right_on: SupplierID
    Categories:
      model: Categories
      type: one
      left_on: CategoryID
      right_on: CategoryID

Orders:
  table: Orders
  dimensions:
    OrderID: _.OrderID
    CustomerID: _.CustomerID
    EmployeeID: _.EmployeeID
    OrderDate: _.OrderDate
    RequiredDate: _.RequiredDate
    ShippedDate: _.ShippedDate
    ShipVia: _.ShipVia
    Freight: _.Freight
    ShipName: _.ShipName
    ShipCity: _.ShipCity
    ShipRegion: _.ShipRegion
    ShipCountry: _.ShipCountry
  measures:
    OrderCount: _.count()
    TotalFreight: _.Freight.sum()
    AvgFreight: _.Freight.mean()
  joins:
    Customers:
      model: Customers
      type: one
      left_on: CustomerID
      right_on: CustomerID
    # Employees:
    #   model: Employees
    #   type: one
    #   left_on: EmployeeID
    #   right_on: EmployeeID

OrderDetails:
  table: OrderDetails
  dimensions:
    OrderID: _.OrderID
    ProductID: _.ProductID
    UnitPrice: _.UnitPrice
    Quantity: _.Quantity
    Discount: _.Discount
  measures:
    TotalQuantitySold: _.Quantity.sum()
    TotalGrossSales: (_.UnitPrice * _.Quantity).sum()
    TotalNetSales: ((_.UnitPrice * _.Quantity) * (1 - _.Discount)).sum()
    DistinctOrders: _.count()
    DistinctProductsSold: _.count()
  joins:
    Orders:
      model: Orders
      type: one
      left_on: OrderID
      right_on: OrderID
    Products:
      model: Products
      type: one
      left_on: ProductID
      right_on: ProductID
